name: MLOps Pipeline

on:
  push:
    branches: [main]
    paths:
      - 'data/**.dvc'
      - 'src/**.py'
      - 'params.yaml'
  workflow_dispatch:

jobs:
  test:
    name: Unit Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run unit tests
        run: pytest tests/ -v

  train:
    name: Train & Eval
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - id: 'auth'
        uses: 'google-github-actions/auth@v2'
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY }}'

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Pull data with DVC
        run: |
          if dvc remote list | grep -q '^storage'; then
            dvc remote modify --local storage url "gs://${{ secrets.GCP_BUCKET }}/dvc"
          else
            dvc remote add --local -d storage "gs://${{ secrets.GCP_BUCKET }}/dvc"
          fi
          dvc pull data/train_phase1.csv data/train_phase2.csv data/eval.csv

      - name: Train model
        env:
          MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
          MLFLOW_TRACKING_USERNAME: ${{ secrets.MLFLOW_TRACKING_USERNAME }}
          MLFLOW_TRACKING_PASSWORD: ${{ secrets.MLFLOW_TRACKING_PASSWORD }}
        run: python src/train.py

      - name: Eval Gate & No-Regression Gate
        run: |
          python - <<'EOF'
          import json
          import os
          from google.cloud import storage

          with open('outputs/metrics.json') as f:
              new_metrics = json.load(f)
          new_acc = new_metrics['accuracy']

          print(f"New accuracy: {new_acc:.4f}")
          if new_acc < 0.70:
              raise SystemExit(f"FAILED: accuracy {new_acc:.4f} < 0.70. Deploy cancelled.")

          client = storage.Client()
          bucket_name = os.environ['GCP_BUCKET']
          bucket = client.bucket(bucket_name)
          blob = bucket.blob('models/latest/metrics.json')
          
          if blob.exists():
              prev_metrics_str = blob.download_as_string()
              prev_metrics = json.loads(prev_metrics_str)
              prev_acc = prev_metrics.get('accuracy', 0.0)
              print(f"Previous accuracy: {prev_acc:.4f}")
              
              if new_acc < prev_acc:
                  raise SystemExit(f"FAILED: new accuracy {new_acc:.4f} is lower than previous {prev_acc:.4f}. Deploy cancelled.")
              else:
                  print("No-regression check passed.")
          else:
              print("No previous model found. Proceeding.")
              
          # Upload new model and metrics to GCS for next time
          print("Uploading new artifacts to GCS...")
          bucket.blob('models/latest/model.pkl').upload_from_filename('models/model.pkl')
          bucket.blob('models/latest/metrics.json').upload_from_filename('outputs/metrics.json')
          bucket.blob('models/latest/report.txt').upload_from_filename('outputs/report.txt')
          print("Upload complete.")
          EOF
        env:
          GCP_BUCKET: ${{ secrets.GCP_BUCKET }}

      - name: Export Deploy Bundle
        uses: actions/upload-artifact@v4
        with:
          name: deploy-bundle
          path: |
            src/
            requirements.txt
            models/model.pkl
          include-hidden-files: true

  deploy:
    name: Deploy to VM
    needs: train
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Download Deploy Bundle
        uses: actions/download-artifact@v4
        with:
          name: deploy-bundle
          path: deploy_bundle

      - name: Debug bundle
        run: ls -R deploy_bundle

      - name: SCP to VM
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          source: "deploy_bundle/*"
          target: "/tmp/mlops-lab-deploy"
          strip_components: 1

      - name: SSH to VM and Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            set -e
            sudo rm -rf /opt/mlops-lab
            sudo mkdir -p /opt/mlops-lab
            sudo cp -r /tmp/mlops-lab-deploy/* /opt/mlops-lab/
            sudo chown -R $USER:$USER /opt/mlops-lab

            cd /opt/mlops-lab
            test -f requirements.txt
            test -f src/serve.py
            test -f models/model.pkl

            sudo apt-get update
            sudo apt-get install -y python3-venv python3-pip

            python3 -m venv .venv
            .venv/bin/pip install --upgrade pip
            .venv/bin/pip install -r requirements.txt

            sudo tee /etc/systemd/system/mlops-serve.service > /dev/null <<'EOF'
            [Unit]
            Description=MLOps FastAPI model service
            After=network.target

            [Service]
            User=root
            WorkingDirectory=/opt/mlops-lab
            Environment=MODEL_PATH=/opt/mlops-lab/models/model.pkl
            ExecStart=/opt/mlops-lab/.venv/bin/python -m uvicorn src.serve:app --host 0.0.0.0 --port 8000
            Restart=always
            RestartSec=5

            [Install]
            WantedBy=multi-user.target
            EOF

            sudo systemctl daemon-reload
            sudo systemctl enable mlops-serve
            sudo systemctl restart mlops-serve
            # Retry health check up to 90 seconds, every 3 seconds
            max_wait=90
            interval=3
            elapsed=0
            while [ $elapsed -lt $max_wait ]; do
              echo "Checking systemd service status..."
              sudo systemctl is-active --quiet mlops-serve
              if [ $? -eq 0 ]; then
                echo "Service is active, performing curl health check..."
                if curl -fsS http://localhost:8000/health; then
                  echo "Health check passed."
                  sudo ss -tulpn | grep 8000
                  exit 0
                fi
              fi
              echo "Health check failed, retrying in $interval seconds..."
              sleep $interval
              elapsed=$((elapsed + interval))
            done
            echo "Health check failed after $max_wait seconds."
            sudo systemctl status mlops-serve --no-pager -l
            sudo journalctl -u mlops-serve -n 120 --no-pager
            sudo ss -tulpn | grep 8000
            exit 1
