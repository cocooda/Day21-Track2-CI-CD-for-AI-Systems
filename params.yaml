# Hyperparameters for the model
# Supported model_type values:
#   random_forest, extra_trees, gradient_boosting,
#   hist_gradient_boosting, logistic_regression
model_type: extra_trees

extra_trees:
  n_estimators: 800
  max_depth: null
  min_samples_leaf: 1
  # Note: class_weight is intentionally omitted — tests showed
  # no-class-weight ExtraTrees achieves 0.766 vs 0.754 with balanced

random_forest:
  n_estimators: 800
  max_depth: null
  min_samples_leaf: 1
  class_weight: balanced

gradient_boosting:
  n_estimators: 300
  learning_rate: 0.05
  max_depth: 5

hist_gradient_boosting:
  max_iter: 300
  learning_rate: 0.05
  max_leaf_nodes: 63

logistic_regression:
  max_iter: 1000
  C: 1.0
